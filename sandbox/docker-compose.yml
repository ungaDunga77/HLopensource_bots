# Docker Compose for sandboxed bot testing
#
# Usage:
#   # Build + test (Phase 3, isolated):
#   BOT_NAME=chainstack-grid-bot BOT_PATH=bots/chainstack-grid-bot \
#     docker compose -f sandbox/docker-compose.yml run bot-test-python
#
#   # Testnet trial (Phase 4, bridge network):
#   BOT_NAME=chainstack-grid-bot BOT_PATH=bots/chainstack-grid-bot \
#     docker compose -f sandbox/docker-compose.yml --profile testnet run bot-testnet-python

networks:
  isolated:
    driver: bridge
    internal: true  # No external access
  testnet:
    driver: bridge  # External access for testnet API

services:
  # === Phase 3: Build & Test (isolated network) ===

  bot-test-python:
    build:
      context: ..
      dockerfile: sandbox/Dockerfile.python
      args:
        BOT_PATH: ${BOT_PATH:?Set BOT_PATH e.g. bots/chainstack-grid-bot}
    networks:
      - isolated
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    environment:
      - BOT_NAME=${BOT_NAME:?Set BOT_NAME}

  bot-test-node:
    build:
      context: ..
      dockerfile: sandbox/Dockerfile.node
      args:
        BOT_PATH: ${BOT_PATH:?Set BOT_PATH e.g. bots/chainstack-grid-bot}
    networks:
      - isolated
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    environment:
      - BOT_NAME=${BOT_NAME:?Set BOT_NAME}

  bot-test-rust:
    build:
      context: ..
      dockerfile: sandbox/Dockerfile.rust
      args:
        BOT_PATH: ${BOT_PATH:?Set BOT_PATH e.g. bots/chainstack-grid-bot}
    networks:
      - isolated
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    environment:
      - BOT_NAME=${BOT_NAME:?Set BOT_NAME}

  # === Phase 4: Testnet Trial (bridge network) ===

  bot-testnet-python:
    profiles:
      - testnet
    build:
      context: ..
      dockerfile: sandbox/Dockerfile.python
      args:
        BOT_PATH: ${BOT_PATH:?Set BOT_PATH}
    networks:
      - testnet
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env
    environment:
      - BOT_NAME=${BOT_NAME:?Set BOT_NAME}
      - HL_TESTNET=true  # Force testnet, overrides .env
    volumes:
      - ../evaluations/${BOT_NAME}:/app/logs:rw

  bot-testnet-node:
    profiles:
      - testnet
    build:
      context: ..
      dockerfile: sandbox/Dockerfile.node
      args:
        BOT_PATH: ${BOT_PATH:?Set BOT_PATH}
    networks:
      - testnet
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env
    environment:
      - BOT_NAME=${BOT_NAME:?Set BOT_NAME}
      - HL_TESTNET=true
    volumes:
      - ../evaluations/${BOT_NAME}:/app/logs:rw

  bot-testnet-rust:
    profiles:
      - testnet
    build:
      context: ..
      dockerfile: sandbox/Dockerfile.rust
      args:
        BOT_PATH: ${BOT_PATH:?Set BOT_PATH}
    networks:
      - testnet
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env
    environment:
      - BOT_NAME=${BOT_NAME:?Set BOT_NAME}
      - HL_TESTNET=true
    volumes:
      - ../evaluations/${BOT_NAME}:/app/logs:rw
