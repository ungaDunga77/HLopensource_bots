# Docker Compose for sandboxed bot testing
#
# Usage:
#   # Build + test (Phase 3, isolated):
#   BOT_NAME=chainstack-grid-bot BOT_PATH=bots/chainstack-grid-bot \
#     docker compose -f sandbox/docker-compose.yml run bot-test-python
#
#   # Testnet trial (Phase 4, bridge network):
#   BOT_NAME=chainstack-grid-bot BOT_PATH=bots/chainstack-grid-bot \
#     docker compose -f sandbox/docker-compose.yml --profile testnet run bot-testnet-python

networks:
  isolated:
    driver: bridge
    internal: true  # No external access
  testnet:
    driver: bridge  # External access for testnet API

services:
  # === Phase 3: Build & Test (isolated network) ===

  bot-test-python:
    build:
      context: ..
      dockerfile: sandbox/Dockerfile.python
      args:
        BOT_PATH: ${BOT_PATH:?Set BOT_PATH e.g. bots/chainstack-grid-bot}
    networks:
      - isolated
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    environment:
      - BOT_NAME=${BOT_NAME:?Set BOT_NAME}

  bot-test-node:
    build:
      context: ..
      dockerfile: sandbox/Dockerfile.node
      args:
        BOT_PATH: ${BOT_PATH:?Set BOT_PATH e.g. bots/chainstack-grid-bot}
    networks:
      - isolated
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    environment:
      - BOT_NAME=${BOT_NAME:?Set BOT_NAME}

  bot-test-rust:
    build:
      context: ..
      dockerfile: sandbox/Dockerfile.rust
      args:
        BOT_PATH: ${BOT_PATH:?Set BOT_PATH e.g. bots/chainstack-grid-bot}
    networks:
      - isolated
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    environment:
      - BOT_NAME=${BOT_NAME:?Set BOT_NAME}

  # === Phase 4: Testnet Trial (bridge network) ===

  bot-testnet-python:
    profiles:
      - testnet
    build:
      context: ..
      dockerfile: sandbox/Dockerfile.python
      args:
        BOT_PATH: ${BOT_PATH:?Set BOT_PATH}
    networks:
      - testnet
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env
    environment:
      - BOT_NAME=${BOT_NAME:?Set BOT_NAME}
      - HL_TESTNET=true  # Force testnet, overrides .env
    volumes:
      - ../evaluations/${BOT_NAME}:/app/logs:rw

  bot-testnet-node:
    profiles:
      - testnet
    build:
      context: ..
      dockerfile: sandbox/Dockerfile.node
      args:
        BOT_PATH: ${BOT_PATH:?Set BOT_PATH}
    networks:
      - testnet
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env
    environment:
      - BOT_NAME=${BOT_NAME:?Set BOT_NAME}
      - HL_TESTNET=true
    volumes:
      - ../evaluations/${BOT_NAME}:/app/logs:rw

  # Chainstack Grid Bot — Phase 4 testnet trial
  bot-testnet-chainstack:
    profiles:
      - testnet
    build:
      context: ..
      dockerfile: sandbox/Dockerfile.python
      args:
        BOT_PATH: bots/chainstack-grid-bot
    networks:
      - testnet
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env
    environment:
      - BOT_NAME=chainstack-grid-bot
      - HYPERLIQUID_TESTNET=true
    volumes:
      - ../evaluations/chainstack-grid-bot:/app/logs:rw
      - ../evaluations/chainstack-grid-bot/testnet-config.yaml:/app/config.yaml:ro
    command: ["python", "src/run_bot.py", "/app/config.yaml"]

  # Hummingbot — Phase 4 testnet trial (Simple PMM on hyperliquid_perpetual_testnet)
  #
  # One-time conf seed (run before the long-running service):
  #   mkdir -p evaluations/hummingbot/conf
  #   docker compose -f sandbox/docker-compose.yml --profile testnet run --rm \
  #     -v "$PWD/evaluations/hummingbot/conf:/app/conf:rw" \
  #     -v "$PWD/tools/seed_hummingbot_conf.py:/app/tools/seed_hummingbot_conf.py:ro" \
  #     --entrypoint "" bot-testnet-hummingbot \
  #     conda run -n hummingbot python /app/tools/seed_hummingbot_conf.py
  #
  # Long-running trial:
  #   docker compose -f sandbox/docker-compose.yml --profile testnet up bot-testnet-hummingbot
  bot-testnet-hummingbot:
    profiles:
      - testnet
    build:
      context: ..
      dockerfile: sandbox/Dockerfile.hummingbot
      args:
        BOT_PATH: bots/hummingbot
    networks:
      - testnet
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env
    environment:
      - HEADLESS_MODE=true
      - SCRIPT_CONFIG=testnet-config.yml
    volumes:
      - ../evaluations/hummingbot/conf:/app/conf:rw
      - ../evaluations/hummingbot/testnet-config.yml:/app/conf/scripts/testnet-config.yml:ro
      - ../evaluations/hummingbot/pmm_simple_btc.yml:/app/conf/controllers/pmm_simple_btc.yml:ro
      - ../evaluations/hummingbot/logs:/app/logs:rw
      - ../evaluations/hummingbot/data:/app/data:rw
    command:
      - "conda"
      - "run"
      - "--no-capture-output"
      - "-n"
      - "hummingbot"
      - "python"
      - "bin/hummingbot_quickstart.py"
      - "--headless"
      - "true"
      - "--v2"
      - "testnet-config.yml"

  # Passivbot — Phase 4 testnet trial (BTC long, 1x leverage on HL testnet)
  #
  # Requires the image `bot-passivbot:latest` (built in Phase 3).
  # The patched hyperliquid.py is bind-mounted over the in-image copy so we
  # don't need to rebuild (Rust compile is ~10 min).
  #
  # Usage:
  #   docker compose -f sandbox/docker-compose.yml --profile testnet up bot-testnet-passivbot
  bot-testnet-passivbot:
    profiles:
      - testnet
    image: bot-passivbot:latest
    restart: unless-stopped
    networks:
      - testnet
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    working_dir: /app
    volumes:
      - ../bots/passivbot/src/exchanges/hyperliquid.py:/app/src/exchanges/hyperliquid.py:ro
      - ../evaluations/passivbot/api-keys.json:/app/api-keys.json:ro
      - ../evaluations/passivbot/testnet-config.json:/app/testnet-config.json:ro
      - ../evaluations/passivbot/logs:/app/logs:rw
      - ../evaluations/passivbot/caches:/app/caches:rw
      - ../evaluations/passivbot/backtests:/app/backtests:rw
    environment:
      - SKIP_RUST_COMPILE=true
      - PYTHONUNBUFFERED=1
    command:
      - "python"
      - "src/main.py"
      - "--skip-rust-compile"
      - "--log-level"
      - "info"
      - "/app/testnet-config.json"

  # Passivbot — Phase 4 testnet trial #2: FORAGER mode (multi-coin, n_positions < approved_coins)
  bot-testnet-passivbot-forager:
    profiles:
      - testnet
    image: bot-passivbot:latest
    restart: unless-stopped
    networks:
      - testnet
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    working_dir: /app
    volumes:
      - ../bots/passivbot/src/exchanges/hyperliquid.py:/app/src/exchanges/hyperliquid.py:ro
      - ../evaluations/passivbot/api-keys.json:/app/api-keys.json:ro
      - ../evaluations/passivbot/testnet-forager-config.json:/app/testnet-config.json:ro
      - ../evaluations/passivbot/logs:/app/logs:rw
      - ../evaluations/passivbot/caches:/app/caches:rw
      - ../evaluations/passivbot/backtests:/app/backtests:rw
    environment:
      - SKIP_RUST_COMPILE=true
      - PYTHONUNBUFFERED=1
    command:
      - "python"
      - "src/main.py"
      - "--skip-rust-compile"
      - "--log-level"
      - "info"
      - "/app/testnet-config.json"

  # Freqtrade-titouan — Phase 5 Trial A: HL testnet smoke (BTC/USDC perp, 1x, $12 stake)
  bot-testnet-freqtrade-titouan:
    profiles:
      - testnet
    image: freqtrade-titouan:trial
    restart: unless-stopped
    networks:
      - testnet
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    working_dir: /freqtrade
    volumes:
      - ../evaluations/freqtrade-titouan/testnet-config-live.json:/freqtrade/testnet-config.json:ro
      - ../evaluations/freqtrade-titouan/user_data:/freqtrade/user_data:rw
    environment:
      - PYTHONUNBUFFERED=1
    command:
      - "trade"
      - "--config"
      - "/freqtrade/testnet-config.json"
      - "--logfile"
      - "/freqtrade/user_data/logs/trial-a.log"

  # Passivbot — Phase 4 testnet trial #3: FULL FORAGER (shorts enabled, multi-position long)
  bot-testnet-passivbot-trial3:
    profiles:
      - testnet
    image: bot-passivbot:latest
    restart: unless-stopped
    networks:
      - testnet
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    working_dir: /app
    volumes:
      - ../bots/passivbot/src/exchanges/hyperliquid.py:/app/src/exchanges/hyperliquid.py:ro
      - ../evaluations/passivbot/api-keys.json:/app/api-keys.json:ro
      - ../evaluations/passivbot/testnet-forager-trial3-config.json:/app/testnet-config.json:ro
      - ../evaluations/passivbot/logs:/app/logs:rw
      - ../evaluations/passivbot/caches:/app/caches:rw
      - ../evaluations/passivbot/backtests:/app/backtests:rw
    environment:
      - SKIP_RUST_COMPILE=true
      - PYTHONUNBUFFERED=1
    command:
      - "python"
      - "src/main.py"
      - "--skip-rust-compile"
      - "--log-level"
      - "info"
      - "/app/testnet-config.json"

  bot-testnet-rust:
    profiles:
      - testnet
    build:
      context: ..
      dockerfile: sandbox/Dockerfile.rust
      args:
        BOT_PATH: ${BOT_PATH:?Set BOT_PATH}
    networks:
      - testnet
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env
    environment:
      - BOT_NAME=${BOT_NAME:?Set BOT_NAME}
      - HL_TESTNET=true
    volumes:
      - ../evaluations/${BOT_NAME}:/app/logs:rw
