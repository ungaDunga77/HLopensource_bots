# HIP-3 Mainnet — small-capital viable grid MM (BTC/ETH). SINGLE SOURCE OF TRUTH.
#
# This file is version-controlled and contains NO secrets. Run it directly:
#   osbot --config configs/hip3-mainnet.yaml --run
#
# Auth comes from the environment, not this file:
#   - HYPERLIQUID_MAINNET_PRIVATE_KEY (in .env) — primary. account_address is
#     derived from it (master-key mode), so it is intentionally omitted here.
#   - For agent-wallet mode (signing wallet ≠ funded account), set the funded
#     account explicitly via the OSBOT_ACCOUNT_ADDRESS env var.
#   - keyfile_path below is the fallback auth path (password via OSBOT_KEYFILE_PASSWORD).
#
# Sizing rationale (see docs/lessons.md — grid min-notional trap):
#   Min viable capital ≈ min_notional * grid_levels * n_active_pairs / WEL
#                      = 10 * 3 * 1 / 0.25 = $120 floor; healthy from ~$180.
#   The grid quotes nothing (cancel-only) below 1.3× the per-level floor by design.
#   Re-expand to multi-pair / 5-level / equity perps only above ~$1k.

mode: mainnet
confirm_mainnet: true   # explicit opt-in; does nothing without a mainnet key in env
keyfile_path: secrets/mainnet.keyfile   # path only (not a secret); fallback to env key

strategy:
  pair: BTC
  leverage: 3
  grid_levels: 3                 # keeps per-level notional above the $10 floor at small capital
  wallet_exposure_limit: 0.25    # raised from 0.15 so per-level clears min notional
  range_bps_min: 50
  tp_pct: 0.002
  sl_pct: 0.02
  exit_ttl_s: 43200  # 12h
  sl_consecutive_breaches: 2
  inventory_skew_gamma: 500.0
  inventory_skew_horizon_s: 300.0
  pair_overrides:
    ETH:
      range_bps_min: 40

risk:
  max_daily_loss_pct: 0.03
  min_notional_usd: 10.0

observability:
  shadow_db_path: data/hip3-mainnet-shadow.sqlite
  health_port: 8080

forager:
  enabled: true
  candidate_pairs:        # BTC/ETH only — dropped SOL (szDecimals min-notional) and
    - BTC                 # xyz equity perps (weekend gap risk too high at this capital)
    - ETH
  top_n: 1                # 1 active pair → undivided WEL (no per-pair splitting)
  rotate_every_s: 3600
  log_range_window_min: 16
  min_volume_usd_24h: 1000.0
